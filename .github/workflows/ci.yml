name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: '1'
      - name: Verify PDF API runtime files exist after install
        run: |
          test -f node_modules/md-mermaid-pdf/presets/document-dark.css
          test -f node_modules/mermaid/dist/mermaid.min.js
      - run: npm run build
